services:
  postgres:
    image: postgres:16-alpine
    container_name: tattobook-db
    environment:
      POSTGRES_USER: tattobook
      POSTGRES_PASSWORD: tattobook
      POSTGRES_DB: tattobook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
